---
- hosts: websever
  become: yes
  vars:
    build_number: '{{ BUILD_NUMBER }}'
  tasks:
      
    - name: login to jfrog
      shell: docker login -u test -p Test@12345 trialtypobk.jfrog.io
    
    - name: pull an image
      shell: docker pull trialtypobk.jfrog.io/testapp/sampledockeruplaod:v.1.0.1-{{ build_number }}

    - name: remove container
      shell: docker rm -f devopsAppDeploy
        
    - name: create application container
      shell: docker run -id --name devopsAppDeploy -p 8111:8080 trialtypobk.jfrog.io/testapp/sampledockeruplaod:v.1.0.1-{{ build_number }}
   
